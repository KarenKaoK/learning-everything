<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Rendered preview of an English learning note</title>
  <desc id="desc">A screenshot-style preview showing a Markdown note about the BBC Learning English episode Making cities feel quieter.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f4ee"/>
      <stop offset="0.48" stop-color="#eef6f1"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect x="110" y="82" width="1060" height="656" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="110" y="82" width="1060" height="48" rx="8" fill="#263238"/>
  <circle cx="142" cy="106" r="7" fill="#ef5350"/>
  <circle cx="166" cy="106" r="7" fill="#ffca28"/>
  <circle cx="190" cy="106" r="7" fill="#66bb6a"/>
  <text x="640" y="113" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#d7dee2">6 minunte english - Making cities feel quieter.md</text>

  <rect x="166" y="170" width="154" height="34" rx="17" fill="#e8f3ed"/>
  <text x="189" y="192" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#20724f">EnglishLearning</text>
  <text x="166" y="236" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#17202a">6 Minute English</text>
  <text x="166" y="286" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#263238">Making cities feel quieter</text>
  <text x="166" y="328" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5f6f7a">Source: BBC Learning English · Last reviewed: May 25, 2026 · Next review: May 28, 2026</text>
  <line x1="166" y1="366" x2="1114" y2="366" stroke="#e5e9ec" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#1d2730">
    <text x="188" y="420">1. Exposure to loud noise has been linked to stress and anxiety.</text>
    <text x="188" y="474">2. Soundscaping adds certain sounds to busy public spaces so they feel more relaxing.</text>
    <text x="188" y="528">3. Charles and his team built an immersive sound art installation with planted speakers.</text>
    <text x="188" y="582">4. It is counterintuitive, but calmer sounds can make a park feel less noisy.</text>
    <text x="188" y="636">5. Counterintuitive means something happens differently from what you would expect.</text>
  </g>

  <rect x="166" y="674" width="948" height="1" fill="#e5e9ec"/>
  <text x="166" y="708" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#667781">Markdown learning note preview</text>
</svg>
